<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Wordly Dictionary</h1>

    <!-- Search Form -->
    <form id="searchForm">
      <input 
        type="text" 
        id="wordInput" 
        placeholder="Enter a word..." 
        aria-label="Search word"
      >
      <button type="submit">Search</button>
    </form>

    <!-- Results -->
    <div id="result">
      <h2 id="word"></h2>
      <p id="phonetic"></p>
      <audio id="audio" controls></audio>

      <div id="definitions"></div>
      <p id="synonyms"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
