<!DOCTYPE html> 
  <html lang="en">
  <head> <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap CSS for styling and responsiveness -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  </head> 
  <body> 
    <div class="container py-5">
  <header class="text-center mb-4">
  <h1 class="fw-bold">Wordly Dictionary</h1>
   <p class="text-muted">Search any word and get its meaning instantly</p> 
  </header> 

  <!-- Dictionary search area -->
  <section>

    <!--Input search form --> 
    <form id="searchForm" class="d-flex mb-4" role="search">
    <input type="text" id="searchInputBox" class="form-control" placeholder="Type a word to look up..." aria-label="Word search input" > 
    <button class="btn btn-primary" type="submit"> Search
    </button> 
    </form>

    <!-- Error when API fails or input is empty -->
    <p id="errorBanner" class="text-danger"></p> 

    <!-- Result display card --> 
    <div id="resultPanel" class="card shadow-sm p-4">

    <!-- Word title --> 
     <h2 id="displayWord"></h2>
     
    <!-- Spelling --> 
    <p id="phoneticText" class="text-muted"></p>

    <!-- Pronunciation --> 
    <audio id="pronunciationAudio" controls class="mb-3"></audio>

    <!-- Definitions -->
    <div id="definitionList">
      <h4>Definitions:</h4>
      <ul id="definitions"></ul>
    </div> 

    <!-- Synonyms--> 
    <p id="synonymOutput" class="mt-3 fw-semibold"></p> 
    </div>
    </section> 
    </div> 
    
    <script src="script.js"></script> 

    </body>
    </html>
